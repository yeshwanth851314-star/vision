name: VisionOS Enterprise CI/CD Pipeline (`24_CI_CD.md`)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  GCP_PROJECT_ID: visionos-stadium-prod

jobs:
  verify-and-test:
    name: 1. Build, Typecheck, & Automated QA (`Pod 3` / `Pod 4`)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9.12.0

      - name: Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        run: pnpm turbo run lint

      - name: Run Typechecks
        run: pnpm turbo run typecheck

      - name: Run Unit & Integration Tests (with Coverage)
        run: pnpm exec vitest run --coverage

      - name: Run Dedicated Security Tests
        run: pnpm exec vitest run tests/non-functional/accessibility-and-security.test.ts

      - name: Run AI Evaluation Framework
        run: pnpm --filter @visionos/ai-router test

      - name: Install Playwright Browsers (Chromium only for E2E speed in CI)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E & Accessibility (Axe-core) Tests
        run: npx playwright test --project=chromium

      - name: Run Monorepo Build
        run: pnpm turbo run build

      - name: Run Prisma ORM Schema & Migration Dry-Run
        working-directory: ./apps/api-gateway
        run: npx prisma validate && npx prisma migrate status --offline

  docker-build:
    name: 2. Containerization & Registry Push (`Pod 7`)
    needs: verify-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate Docker to GCR
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and Push API Gateway Docker Image
        run: |
          docker build -f apps/api-gateway/Dockerfile -t gcr.io/${{ env.GCP_PROJECT_ID }}/api-gateway:${{ github.sha }} .
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/api-gateway:${{ github.sha }}

  deploy-canary:
    name: 3. Cloud Run Active-Active Canary Deployment (`25_Deployment.md`)
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Canary to Cloud Run (10% Traffic)
        run: |
          # Query service status and check for stable traffic tags
          if gcloud run services list --project=${{ env.GCP_PROJECT_ID }} --format="value(SERVICE)" | grep -q "visionos-api-gateway"; then
            if gcloud run revisions list --service=visionos-api-gateway --project=${{ env.GCP_PROJECT_ID }} --format="value(TAGS)" | grep -q "stable"; then
              echo "Stable tag found. Deploying canary traffic split (10% latest, 90% stable)."
              TRAFFIC_OPTS="--traffic 10=latest,90=stable"
            else
              echo "Stable tag not found. Deploying with 100% traffic to latest."
              TRAFFIC_OPTS="--traffic latest=100"
            fi
          else
            echo "Service does not exist. Initializing deployment with 100% traffic."
            TRAFFIC_OPTS="--traffic latest=100"
          fi

          gcloud run deploy visionos-api-gateway \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/api-gateway:${{ github.sha }} \
            --region us-central1 \
            $TRAFFIC_OPTS \
            --allow-unauthenticated
